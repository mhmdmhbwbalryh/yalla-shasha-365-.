<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YALLA SHASHA 365</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
<img src="logo.png" class="logo">
<div class="title">YALLA SHASHA 365</div>
</div>

<div style="text-align:center;">
<h3>بداية المباريات اليوم الساعة 8:27 مساءً</h3>
<div id="countdown" class="countdown"></div>
</div>

<div style="text-align:center;margin:15px 0;">
<button onclick="prevDay()">⬅️</button>
<span id="currentDay" style="font-size:20px;color:#facc15;">اليوم</span>
<button onclick="nextDay()">➡️</button>
</div>

<div id="matchesContainer"></div>

<hr>

<h3 style="text-align:center;">إدخال نتيجة</h3>
<div style="text-align:center;">
<select id="team1"></select>
<input type="number" id="score1" placeholder="أهداف">
🆚
<select id="team2"></select>
<input type="number" id="score2" placeholder="أهداف">
<br>
<button onclick="addMatch()">حفظ النتيجة</button>
</div>

<h3 style="text-align:center;">ترتيب الفرق</h3>
<table id="table">
<tr>
<th>الفريق</th>
<th>لعب</th>
<th>فاز</th>
<th>تعادل</th>
<th>خسر</th>
<th>له</th>
<th>عليه</th>
<th>نقاط</th>
</tr>
</table>

<script src="script.js"></script>
</body>
</html>
