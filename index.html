<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yalla Shasha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="logo">Yalla Shasha</h1>

<div class="matches">

  <div class="match-card" onclick="openMatch(0)">
    <div class="teams">
      <span>الهجانة</span>
      <span class="score">2 - 1</span>
      <span>أبوطيرة</span>
    </div>
    <div class="status">انتهت</div>
  </div>

  <div class="match-card" onclick="openMatch(1)">
    <div class="teams">
      <span>العمل الخاص</span>
      <span class="score">1 - 1</span>
      <span>أمن يا جن</span>
    </div>
    <div class="status live">LIVE</div>
  </div>

  <div class="match-card" onclick="openMatch(2)">
    <div class="teams">
      <span>الفدائيين</span>
      <span class="score">3 - 2</span>
      <span>سنايبر</span>
    </div>
    <div class="status">انتهت</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
