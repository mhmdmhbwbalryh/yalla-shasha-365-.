<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon League</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="logo">🔥 DRAGON LEAGUE 🔥</h1>

<div id="home">

  <div class="match" onclick="openMatch(0)">
    الهجانة × أبوطيرة
  </div>

  <div class="match" onclick="openMatch(1)">
    العمل الخاص × أمن يا جن
  </div>

  <div class="match" onclick="openMatch(2)">
    الفدائيين × سنايبر
  </div>

</div>

<div id="details" class="hidden">
  <button class="back" onclick="goHome()">⬅ رجوع</button>

  <div class="options">
    <button onclick="showLineup()">التشكيلة</button>
    <button onclick="showStandings()">ترتيب الفرق</button>
    <button onclick="showScorers()">الهدافين</button>
    <button onclick="showAssists()">صانعي الأهداف</button>
  </div>

  <div id="content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
