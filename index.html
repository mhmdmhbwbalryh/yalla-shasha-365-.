<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Yalla Shasha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-btn" onclick="adminLogin()">الإدارة</div>

<h1 class="title">Yalla Shasha</h1>

<div class="matches">
  <div class="match" onclick="openMatch(0)">
    الهجانة × أبوطيرة
    <span>16:00</span>
  </div>
  <div class="match" onclick="openMatch(1)">
    العمل الخاص × أمن يا جن
    <span>18:00</span>
  </div>
  <div class="match" onclick="openMatch(2)">
    الفدائيين × سنايبر
    <span>20:00</span>
  </div>
</div>

<div id="modal" class="modal">
  <button class="back" onclick="closeMatch()">رجوع</button>

  <div class="content">
    <div class="menu">
      <button onclick="showLineup()">التشكيلة</button>
      <button onclick="showStandings()">ترتيب الفرق</button>
      <button onclick="showScorers()">الهدافين</button>
      <button onclick="showAssists()">صانعي الأهداف</button>
    </div>

    <div id="view"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
