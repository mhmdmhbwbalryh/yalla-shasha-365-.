<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YALLA SHASHA 365</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div class="title">YALLA SHASHA 365</div>
</div>

<div style="text-align:center;">
  <h3>بداية المباراة اليوم الساعة 8:27 مساءً</h3>
  <div id="countdown" class="countdown"></div>
</div>

<div style="text-align:center;margin:15px 0;">
  <button onclick="prevMatch()">⬅️</button>
  <span id="currentMatch" style="font-size:20px;color:#facc15;">المباراة الحالية</span>
  <button onclick="nextMatch()">➡️</button>
</div>

<div id="matchesContainer"></div>

<hr>

<h3 style="text-align:center;">ترتيب الفرق</h3>
<table id="table">
<tr>
<th>الفريق</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>له</th><th>عليه</th><th>نقاط</th>
</tr>
</table>

<h3 style="text-align:center;margin-top:20px;">الهدافون وصانعو الأهداف</h3>
<table id="scorers">
<tr>
<th>اللاعب</th><th>الفريق</th><th>الأهداف</th><th>التمريرات الحاسمة</th>
</tr>
</table>

<hr>

<div style="text-align:center;margin-top:20px;color:white;font-weight:bold;">
<p>صمم بواسطة محمد محبوب الريح</p>
<p style="color:red;font-weight:bold;">™ TARGRYAN FC</p>
<p>جميع الحقوق محفوظة 2026</p>
</div>

<script src="script.js"></script>
</body>
</html>
